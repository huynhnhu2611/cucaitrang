<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pronunciation Checker</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 50px; background-color: #f4f7f6; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        h2 { color: #2c3e50; }
        #target-text { font-size: 24px; font-weight: bold; color: #3498db; margin: 20px 0; }
        button { padding: 12px 25px; font-size: 16px; cursor: pointer; border: none; border-radius: 5px; background-color: #2ecc71; color: white; transition: 0.3s; }
        button:hover { background-color: #27ae60; }
        button:disabled { background-color: #95a5a6; }
        #result { margin-top: 20px; font-size: 18px; }
        .score { font-size: 40px; font-weight: bold; margin-top: 10px; }
        .feedback { color: #7f8c8d; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h2>Luyện Phát Âm Mỹ</h2>
    <p>Hãy đọc câu dưới đây:</p>
    <div id="target-text">English is easy</div>
    
    <button id="start-btn">Bắt đầu nói</button>
    
    <div id="result">
        <p class="feedback" id="status">Nhấn nút để bắt đầu...</p>
        <div class="score" id="score-display">--%</div>
        <p id="transcript"></p>
    </div>
</div>

<script>
    const targetText = "English is easy".toLowerCase().replace(/[.,/#!$%^&*;:{}=\-_`~()]/g,"");
    const startBtn = document.getElementById('start-btn');
    const status = document.getElementById('status');
    const scoreDisplay = document.getElementById('score-display');
    const transcriptDisplay = document.getElementById('transcript');

    // Kiểm tra trình duyệt hỗ trợ
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (!SpeechRecognition) {
        alert("Trình duyệt của bạn không hỗ trợ nhận diện giọng nói. Hãy dùng Chrome.");
    } else {
        const recognition = new SpeechRecognition();
        
        // Cấu hình ngôn ngữ chuẩn Anh-Mỹ
        recognition.lang = 'en-US'; 
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        startBtn.onclick = () => {
            recognition.start();
            status.innerText = "Đang nghe... (Giọng Mỹ)";
            startBtn.disabled = true;
        };

        recognition.onresult = (event) => {
            const userSpeech = event.results[0][0].transcript.toLowerCase().replace(/[.,/#!$%^&*;:{}=\-_`~()]/g,"");
            const confidence = event.results[0][0].confidence;
            
            transcriptDisplay.innerHTML = `Bạn đã nói: <b>"${userSpeech}"</b>`;
            
            // Tính điểm dựa trên thuật toán Levenshtein (độ tương đồng) hoặc so sánh trực tiếp đơn giản
            let score = 0;
            if (userSpeech === targetText) {
                score = Math.round(confidence * 100);
            } else {
                // Nếu không khớp hoàn toàn, tính toán độ lệch
                score = calculateSimilarity(userSpeech, targetText) * 100;
            }

            scoreDisplay.innerText = Math.round(score) + "%";
            scoreDisplay.style.color = score > 70 ? "#2ecc71" : "#e74c3c";
            status.innerText = "Hoàn thành!";
            startBtn.disabled = false;
        };

        recognition.onspeechend = () => {
            recognition.stop();
        };

        recognition.onerror = (event) => {
            status.innerText = "Lỗi: " + event.error;
            startBtn.disabled = false;
        };
    }

    // Hàm tính độ tương đồng đơn giản giữa 2 chuỗi
    function calculateSimilarity(s1, s2) {
        let longer = s1.length > s2.length ? s1 : s2;
        let shorter = s1.length > s2.length ? s2 : s1;
        if (longer.length === 0) return 1.0;
        return (longer.length - editDistance(longer, shorter)) / parseFloat(longer.length);
    }

    function editDistance(s1, s2) {
        let costs = [];
        for (let i = 0; i <= s1.length; i++) {
            let lastValue = i;
            for (let j = 0; j <= s2.length; j++) {
                if (i === 0) costs[j] = j;
                else {
                    if (j > 0) {
                        let newValue = costs[j - 1];
                        if (s1.charAt(i - 1) !== s2.charAt(j - 1))
                            newValue = Math.min(Math.min(newValue, lastValue), costs[j]) + 1;
                        costs[j - 1] = lastValue;
                        lastValue = newValue;
                    }
                }
            }
            if (i > 0) costs[s2.length] = lastValue;
        }
        return costs[s2.length];
    }
</script>

</body>
</html>
