<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pronunciation Checker with Confetti</title>
    <!-- Chèn thư viện tạo hiệu ứng pháo hoa giấy -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .app-card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 450px; position: relative; overflow: hidden; }
        h1 { color: #1a73e8; font-size: 1.5rem; }
        #target-word { font-size: 2rem; font-weight: bold; color: #202124; margin: 20px 0; display: block; }
        
        /* Hiệu ứng nút bấm */
        button { background-color: #1a73e8; color: white; border: none; padding: 15px 30px; border-radius: 50px; font-size: 1rem; cursor: pointer; transition: all 0.3s ease; outline: none; }
        button:hover { background-color: #1557b0; transform: scale(1.05); box-shadow: 0 5px 15px rgba(26, 115, 232, 0.4); }
        button:disabled { background-color: #ccc; transform: none; box-shadow: none; }
        
        /* Trạng thái đang ghi âm */
        .recording { background-color: #ea4335 !important; animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(234, 67, 53, 0.2); }
            100% { transform: scale(1); }
        }

        .result-box { margin-top: 25px; padding: 15px; border-radius: 10px; display: none; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .score { font-size: 3.5rem; font-weight: bold; margin: 10px 0; transition: color 0.5s; }
        .feedback { font-style: italic; color: #5f6368; margin-bottom: 5px; }
        #message { font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="app-card">
    <h1>Luyện Phát Âm Mỹ</h1>
    <p>Hãy đọc to từ/câu sau:</p>
    <span id="target-word">Beautiful</span>

    <br>
    <button id="mic-btn">Bắt đầu nói</button>

    <div id="result-area" class="result-box">
        <div class="feedback" id="user-said"></div>
        <div class="score" id="final-score">0%</div>
        <div id="message"></div>
    </div>
</div>

<script>
    const micBtn = document.getElementById('mic-btn');
    const targetWord = document.getElementById('target-word').innerText.toLowerCase().trim();
    const resultArea = document.getElementById('result-area');
    const userSaid = document.getElementById('user-said');
    const finalScore = document.getElementById('final-score');
    const message = document.getElementById('message');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (!SpeechRecognition) {
        alert("Trình duyệt của bạn không hỗ trợ nhận diện giọng nói. Vui lòng dùng Chrome.");
    } else {
        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US'; 
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        micBtn.onclick = () => {
            recognition.start();
            micBtn.innerText = "Đang nghe...";
            micBtn.classList.add('recording');
        };

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript.toLowerCase().trim();
            const confidence = event.results[0][0].confidence;
            processResult(transcript, confidence);
        };

        recognition.onspeechend = () => {
            recognition.stop();
            resetButton();
        };

        recognition.onerror = () => {
            alert("Không nghe rõ, vui lòng thử lại!");
            resetButton();
        };
    }

    function resetButton() {
        micBtn.innerText = "Bắt đầu nói";
        micBtn.classList.remove('recording');
    }

    // Hàm bắn pháo hoa chúc mừng
    function GiaoDienChucMung() {
        // Bắn từ bên trái
        confetti({
            particleCount: 100,
            spread: 70,
            origin: { x: 0, y: 0.6 }
        });
        // Bắn từ bên phải
        confetti({
            particleCount: 100,
            spread: 70,
            origin: { x: 1, y: 0.6 }
        });
    }

    function processResult(speech, confidence) {
        resultArea.style.display = 'block';
        userSaid.innerHTML = `Bạn đã nói: <b>"${speech}"</b>`;

        let score = 0;
        if (speech === targetWord) {
            score = Math.round(confidence * 100);
        } else {
            score = Math.round(calculateSimilarity(speech, targetWord) * 60); 
        }

        finalScore.innerText = `${score}%`;
        
        // Phân loại kết quả và kích hoạt hiệu ứng
        if (score >= 80) {
            finalScore.style.color = "#28a745";
            message.innerText = "🎉 Tuyệt vời! Chuẩn giọng Mỹ rồi! 🎉";
            message.style.color = "#28a745";
            
            // Kích hoạt hiệu ứng pháo hoa giấy chúc mừng
            GiaoDienChucMung();

        } else if (score >= 50) {
            finalScore.style.color = "#ffc107";
            message.innerText = "👍 Khá tốt, cố gắng rõ âm hơn chút nữa!";
            message.style.color = "#b58100";
        } else {
            finalScore.style.color = "#dc3545";
            message.innerText = "❌ Chưa chính xác, hãy thử lại nhé!";
            message.style.color = "#dc3545";
        }
    }

    // Thuật toán so sánh chuỗi Levenshtein
    function calculateSimilarity(s1, s2) {
        let longer = s1.length > s2.length ? s1 : s2;
        let shorter = s1.length > s2.length ? s2 : s1;
        if (longer.length === 0) return 1.0;
        return (longer.length - editDistance(longer, shorter)) / parseFloat(longer.length);
    }

    function editDistance(s1, s2) {
        let costs = new Array();
        for (let i = 0; i <= s1.length; i++) {
            let lastValue = i;
            for (let j = 0; j <= s2.length; j++) {
                if (i == 0) costs[j] = j;
                else {
                    if (j > 0) {
                        let newValue = costs[j - 1];
                        if (s1.charAt(i - 1) != s2.charAt(j - 1))
                            newValue = Math.min(Math.min(newValue, lastValue), costs[j]) + 1;
                        costs[j - 1] = lastValue;
                        lastValue = newValue;
                    }
                }
            }
            if (i > 0) costs[s2.length] = lastValue;
        }
        return costs[s2.length];
    }
</script>

</body>
</html>
