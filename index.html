<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doggy English - Pronunciation Coach</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* Nền xanh lá với pattern chân chó */
        body {
            background-color: #ecfdf5;
            background-image: url("https://www.transparenttextures.com/patterns/paws.png");
        }
        .correct { color: #059669; font-weight: bold; position: relative; }
        .incorrect { color: #EF4444; font-weight: bold; text-decoration: line-through; opacity: 0.7; }
        
        /* Hiệu ứng rung nhẹ cho các con chó khi hover */
        .dog-sticker:hover {
            animation: wiggle 0.5s ease-in-out infinite;
        }
        @keyframes wiggle {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }
    </style>
</head>
<body class="font-sans min-h-screen flex items-center justify-center p-4">

    <div class="fixed top-10 left-10 text-6xl dog-sticker select-none opacity-20 md:opacity-100">🐶</div>
    <div class="fixed bottom-10 right-10 text-6xl dog-sticker select-none opacity-20 md:opacity-100">🐕</div>
    <div class="fixed top-20 right-20 text-5xl dog-sticker select-none opacity-20 md:opacity-100">🐩</div>
    <div class="fixed bottom-20 left-20 text-5xl dog-sticker select-none opacity-20 md:opacity-100">🐾</div>

    <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-md w-full border-4 border-emerald-100 relative z-10">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-bold text-emerald-600 flex items-center gap-2">
                <span>🐕</span> Doggy Coach
            </h1>
            <span id="progress-text" class="text-xs bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full font-bold">Câu 1/7</span>
        </div>
        
        <div class="mb-6 relative">
            <p class="text-sm text-emerald-500 font-bold mb-2 flex items-center gap-1">
                Sủa... ý tôi là Đọc câu này:
            </p>
            <div id="target-text" class="text-lg font-semibold text-gray-800 bg-emerald-50 p-5 rounded-2xl border-2 border-emerald-100 min-h-[80px] flex items-center shadow-inner">
                Loading...
            </div>
            
            <div class="flex justify-between items-center mt-3">
                <span id="auto-next-status" class="text-xs text-orange-500 font-bold animate-bounce hidden">🦴 Giỏi lắm! Thưởng cho bạn 1 khúc xương...</span>
                <button onclick="changeSentence()" class="text-xs text-emerald-500 hover:text-emerald-700 font-bold ml-auto flex items-center gap-1">
                    🔄 Đổi câu khác
                </button>
            </div>
        </div>

        <div class="flex flex-col items-center justify-center gap-4 my-8">
            <button id="btn-record" onclick="toggleListening()" class="w-24 h-24 bg-emerald-500 text-white rounded-full flex items-center justify-center shadow-lg hover:bg-emerald-600 transition-all focus:outline-none ring-8 ring-emerald-50 group">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 group-hover:scale-110 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                </svg>
            </button>
            <p id="status" class="text-sm text-emerald-600 font-medium text-center bg-white px-4 py-1 rounded-full border border-emerald-100 shadow-sm">Bấm để sủa... à nhầm, để nói!</p>
        </div>

        <div class="space-y-4 pt-6 border-t-2 border-dashed border-emerald-100">
            <div>
                <p class="text-xs text-gray-400 uppercase tracking-widest font-bold">Kết quả:</p>
                <p id="result-text" class="text-gray-700 italic text-lg mt-1">—</p>
            </div>

            <div>
                <p class="text-xs text-gray-400 uppercase tracking-widest font-bold">So sánh chi tiết:</p>
                <div id="analysis-text" class="text-gray-800 text-lg mt-1 tracking-wide">—</div>
            </div>

            <div>
                <div class="flex justify-between mb-1">
                    <span class="text-xs font-bold text-emerald-600">Độ chuẩn xác</span>
                    <span id="score-text" class="text-sm font-black text-emerald-600">0%</span>
                </div>
                <div class="w-full bg-emerald-50 h-4 rounded-full p-1 border border-emerald-100">
                    <div id="score-bar" class="bg-emerald-500 h-full rounded-full w-0 transition-all duration-700"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const sentences = [
            "How is the weather today?",
            "I would like to order a cup of coffee.",
            "Practice makes perfect.",
            "The golden retriever is very friendly.",
            "I love playing with my dog in the park.",
            "Dogs are a man's best friend.",
            "The sky is blue and the grass is green."
        ];

        let currentSentenceIndex = 0;
        let autoNextTimeout = null; 

        const targetTextElem = document.getElementById('target-text');
        const progressTextElem = document.getElementById('progress-text');
        const autoNextStatusElem = document.getElementById('auto-next-status');
        const btnRecord = document.getElementById('btn-record');
        const statusElem = document.getElementById('status');
        const resultTextElem = document.getElementById('result-text');
        const analysisElem = document.getElementById('analysis-text');
        const scoreBar = document.getElementById('score-bar');
        const scoreText = document.getElementById('score-text');

        targetTextElem.innerText = sentences[currentSentenceIndex];
        progressTextElem.innerText = `Câu 1/${sentences.length}`;

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        let isListening = false;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false; 
            recognition.lang = 'en-US'; 
            recognition.interimResults = false; 

            recognition.onstart = () => {
                isListening = true;
                if(autoNextTimeout) clearTimeout(autoNextTimeout);
                autoNextStatusElem.classList.add('hidden');
                statusElem.innerText = "🦴 Tôi đang nghe đây...";
                btnRecord.classList.replace('bg-emerald-500', 'bg-orange-500');
                btnRecord.classList.add('animate-pulse');
            };

            recognition.onend = () => {
                isListening = false;
                statusElem.innerText = "Đang kiểm tra...";
                btnRecord.classList.replace('bg-orange-500', 'bg-emerald-500');
                btnRecord.classList.remove('animate-pulse');
            };

            recognition.onresult = (event) => {
                const speechToText = event.results[0][0].transcript;
                resultTextElem.innerText = `"${speechToText}"`;
                evaluatePronunciation(targetTextElem.innerText, speechToText);
            };
        }

        function toggleListening() {
            if (!recognition) return;
            isListening ? recognition.stop() : recognition.start();
        }

        function changeSentence() {
            if(autoNextTimeout) clearTimeout(autoNextTimeout);
            autoNextStatusElem.classList.add('hidden');
            currentSentenceIndex = (currentSentenceIndex + 1) % sentences.length;
            targetTextElem.innerText = sentences[currentSentenceIndex];
            progressTextElem.innerText = `Câu ${currentSentenceIndex + 1}/${sentences.length}`;
            resetUI();
        }

        function resetUI() {
            resultTextElem.innerText = "—";
            analysisElem.innerHTML = "—";
            scoreBar.style.width = "0%";
            scoreText.innerText = "0%";
            statusElem.innerText = "Bấm để sủa... à nhầm, để nói!";
        }

        function cleanWord(word) {
            return word.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?]/g, "");
        }

        function triggerFireworks() {
            const defaults = { spread: 360, ticks: 50, gravity: 0.5, decay: 0.94, startVelocity: 30, shapes: ['star'], colors: ['#10B981', '#F59E0B'] };
            confetti({ ...defaults, particleCount: 40, origin: { y: 0.7 } });
            confetti({ ...defaults, particleCount: 20, origin: { y: 0.7 }, scalar: 2 });
        }

        function evaluatePronunciation(target, spoken) {
            const targetWords = target.trim().split(/\s+/);
            const spokenWords = spoken.trim().split(/\s+/);
            let htmlAnalysis = [];
            let correctCount = 0;

            targetWords.forEach((tWord) => {
                const cleanedT = cleanWord(tWord);
                const matchIndex = spokenWords.findIndex(sWord => cleanWord(sWord) === cleanedT);

                if (matchIndex !== -1) {
                    htmlAnalysis.push(`<span class="correct">${tWord}</span>`);
                    spokenWords.splice(matchIndex, 1);
                    correctCount++;
                } else {
                    htmlAnalysis.push(`<span class="incorrect">${tWord}</span>`);
                }
            });

            const scorePercentage = Math.round((correctCount / targetWords.length) * 100);
            analysisElem.innerHTML = htmlAnalysis.join(" ");
            scoreBar.style.width = `${scorePercentage}%`;
            scoreText.innerText = `${scorePercentage}%`;

            if (scorePercentage > 85) {
                statusElem.innerText = "🐶 Gâu! Quá chuẩn!";
                autoNextStatusElem.classList.remove('hidden');
                triggerFireworks();
                autoNextTimeout = setTimeout(changeSentence, 3000);
            } else {
                statusElem.innerText = "🐶 Hừm... Thử lại câu này nhé!";
            }
        }
    </script>
</body>
</html>
